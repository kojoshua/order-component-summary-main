<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="styles.css" rel="stylesheet" type="text/css">
  
  <title>Frontend Mentor | Order summary card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body class="red-hat-display-500">
<!-- This is the container for the summary component-->
  <main>
    <img src="images/illustration-hero.svg" alt="Illustration">
    <h1 class="red-hat-display-900"> Order Summary </h1>
    <p> You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>

<!-- Reigion with Plan Info-->
 <!-- Flex Container-->
    <div class="plan-information">
      <!-- Item 1-->
      <img src="images/icon-music.svg" alt="Music Note">
      <!-- Item 2-->
      
      <p class="red-hat-display-900"> <span class="black-text"> Annual Plan </span> <!--<br>-->
      <span class="red-hat-display-500"> $59.99/year</span></p>
      
      <!-- Item 3-->
      <a class="red-hat-display-700"href="#"> Change</a>
      </div>

<!-- Button styled links-->

     <div id="button">
      <a class="red-hat-display-900"href="#"> Proceed to Payment</a> 
      
    </div>
    <div id="button-2"> 
      <a class="red-hat-display-900"href="#"> Cancel Order</a>
      
      
    </div>

  </main>


  
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
</body>
</html>
